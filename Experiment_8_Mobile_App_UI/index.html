<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Experiment 8: Mobile To-Do App</title>
  <link rel="stylesheet" href="styles.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
  <div class="device-toolbar">
    <button class="device-btn active" data-device="desktop">💻 Desktop</button>
    <button class="device-btn" data-device="laptop">🖥️ Laptop</button>
    <button class="device-btn" data-device="tablet">📱 Tablet</button>
    <button class="device-btn" data-device="android">🤖 Android</button>
    <button class="device-btn" data-device="iphone">📲 iPhone</button>
  </div>
  <div class="main-wrapper">
    <header class="top-header">
      <div class="header-left">
        <h1>📝 Mobile To-Do App</h1>
      </div>
      <div class="header-right">
        <button id="theme-toggle" class="theme-btn">🌙 Dark Mode</button>
      </div>
    </header>
    <div class="app-container" id="app-container">
      <nav class="sidebar">
        <button class="nav-btn active" data-tab="tasks">My Tasks</button>
        <button class="nav-btn" data-tab="analytics">Analytics</button>
        <button class="nav-btn" data-tab="settings">Settings</button>
      </nav>
      <main class="content">
        <!-- Tasks Tab -->
        <div class="tab-content active" id="tasks-tab">
          <div id="login-section" class="login-section">
            <div class="card card-full">
              <h2>Welcome</h2>
              <p class="card-desc">Login to manage your tasks</p>
              <form id="login-form">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit" class="btn primary">Login</button>
              </form>
            </div>
          </div>
          <div id="tasks-section" style="display: none;">
            <div class="tasks-header">
              <button id="add-task-btn" class="btn primary">+ Add Task</button>
            </div>
            <div class="task-controls">
              <input type="text" id="search-tasks" class="search-input" placeholder="🔍 Search tasks..." autocomplete="off">
              <select id="priority-filter" class="filter-select">
                <option value="">All Priorities</option>
                <option value="high">🔴 High</option>
                <option value="medium">🟡 Medium</option>
                <option value="low">🟢 Low</option>
              </select>
              <select id="status-filter" class="filter-select">
                <option value="">All Status</option>
                <option value="pending">⏳ Pending</option>
                <option value="completed">✅ Completed</option>
              </select>
            </div>
            <div class="task-list-container">
              <ul id="task-list"></ul>
            </div>
          </div>
        </div>
        <!-- Analytics Tab -->
        <div class="tab-content" id="analytics-tab">
          <section class="card card-full">
            <h2>Task Analytics</h2>
            <div class="stats-grid">
              <div class="stat-card">
                <div class="stat-label">Total Tasks</div>
                <div class="stat-value" id="stat-total">0</div>
              </div>
              <div class="stat-card">
                <div class="stat-label">Completion Rate</div>
                <div class="stat-value" id="stat-completion">0%</div>
              </div>
            </div>
            <div class="charts-grid">
              <div class="chart-container">
                <h3>Task Status Distribution</h3>
                <canvas id="task-status-chart"></canvas>
              </div>
              <div class="chart-container">
                <h3>Priority Breakdown</h3>
                <canvas id="priority-chart"></canvas>
              </div>
            </div>
          </section>
        </div>
        <!-- Settings Tab -->
        <div class="tab-content" id="settings-tab">
          <section class="card card-full">
            <h2>Settings</h2>
            <div class="settings-group">
              <div class="setting-item">
                <div class="setting-label">Data Management</div>
                <div style="display: flex; gap: 0.7em;">
                  <button id="export-data-btn" class="btn secondary">Export</button>
                  <button id="import-data-btn" class="btn secondary">Import</button>
                </div>
              </div>
              <div class="setting-item">
                <div class="setting-label">Clear All Tasks</div>
                <button id="clear-data-btn" class="btn danger">Clear Tasks</button>
              </div>
              <div class="setting-item">
                <div class="setting-label">Account</div>
                <button id="logout-btn" class="btn danger">Logout</button>
              </div>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <!-- Modal for Add/Edit Task -->
  <div id="modal-overlay" class="modal-overlay">
    <div class="modal">
      <h2 id="modal-title">Add Task</h2>
      <form id="task-form">
        <input type="text" id="task-title" placeholder="Task Title" required>
        <textarea id="task-desc" placeholder="Description"></textarea>
        <select id="task-priority">
          <option value="low">Low Priority</option>
          <option value="medium" selected>Medium Priority</option>
          <option value="high">High Priority</option>
        </select>
        <label class="checkbox-label">
          <input type="checkbox" id="task-completed">
          Mark as completed
        </label>
        <div class="modal-buttons">
          <button type="submit" class="btn primary">Save</button>
          <button type="button" id="close-modal-btn" class="btn secondary">Cancel</button>
        </div>
      </form>
    </div>
  </div>

  <input type="file" id="import-input" style="display: none;" accept=".json">
  <div id="toast"></div>
  <script src="script.js"></script>
</body>
</html>
